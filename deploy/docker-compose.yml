services:
  lifeops-api:
    build:
      context: ../apps/api
    image: lifeops/api:local
    container_name: lifeops-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - lifeops-data:/data
    environment:
      LIFEOPS_ADDR: ":8080"
      LIFEOPS_DB_PATH: "/data/lifeops.db"
      LIFEOPS_WEBHOOK_TOKEN: "${LIFEOPS_WEBHOOK_TOKEN:-dev-token}"
      LIFEOPS_LLM_BASE_URL: "${LIFEOPS_LLM_BASE_URL:-}"
      LIFEOPS_LLM_MODEL: "${LIFEOPS_LLM_MODEL:-qwen2.5:7b}"
      LIFEOPS_LLM_API_KEY: "${LIFEOPS_LLM_API_KEY:-}"

volumes:
  lifeops-data:
