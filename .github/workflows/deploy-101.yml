name: Deploy 101

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-101
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy API to 101
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../../dist/lifeops-api-linux-amd64 .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIFEOPS_101_SSH_KEY }}" > ~/.ssh/lifeops_101
          chmod 600 ~/.ssh/lifeops_101
          ssh-keyscan -H "${{ secrets.LIFEOPS_101_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload binary
        run: |
          scp -i ~/.ssh/lifeops_101 ../../dist/lifeops-api-linux-amd64 \
            "${{ secrets.LIFEOPS_101_USER }}@${{ secrets.LIFEOPS_101_HOST }}:/tmp/lifeops-api"

      - name: Restart service
        run: |
          ssh -i ~/.ssh/lifeops_101 "${{ secrets.LIFEOPS_101_USER }}@${{ secrets.LIFEOPS_101_HOST }}" \
            "sudo install -m 0755 -o root -g root /tmp/lifeops-api /opt/lifeops/lifeops-api && sudo systemctl restart lifeops && sudo systemctl --no-pager --full status lifeops"
